# Conda environment for korean_asr_rtx4060 (RTX 4060 8GB)
# 생성:  conda env create -f environment.yml
# 활성화: conda activate korean_asr_rtx4060
#
# 참고: 기존 py39_pt 환경을 그대로 써도 무방하다. 이 파일은 재현 가능한
#       새 환경 구성을 위한 것이다.
name: korean_asr_rtx4060
channels:
  - conda-forge
dependencies:
  - python=3.9
  - pip
  - portaudio          # pyaudio 빌드/실행에 필요한 시스템 라이브러리
  - pip:
      # RTX 4060(Ada)용 CUDA 빌드
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch>=2.0.0
      - transformers>=4.30.0
      # Audio
      - librosa>=0.10.0
      - soundfile>=0.12.1
      - pyaudio>=0.2.11
      # Data
      - numpy>=1.21.0
      - scipy>=1.7.0
      - psutil>=5.9.0
      # Utilities
      - pyyaml>=6.0
      - click>=8.0.0
      - tqdm>=4.64.0
      - colorama>=0.4.4
      # Web API (FastAPI backend)
      - fastapi>=0.110.0
      - uvicorn[standard]>=0.29.0
      - python-multipart>=0.0.9
      # Optional
      - datasets>=2.10.0
      - matplotlib>=3.5.0
      - seaborn>=0.11.0
      # Dev / test
      - pytest>=7.0.0
      - pytest-cov>=4.0.0
      - black>=22.0.0
      - flake8>=5.0.0
